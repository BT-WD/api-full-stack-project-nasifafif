<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Celebrity Trivia</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="quiz-root">

    <div id="loading">Loading questions...</div>
    <div id="error" style="display:none"></div>

    <div id="quiz-screen" style="display:none">
      <div id="header">
        <h2>Celebrity Trivia</h2>
        <span id="score-badge">Score: 0</span>
      </div>
      <div id="progress-bar-wrap">
        <div id="progress-bar" style="width:0%"></div>
      </div>
      <div id="question-card">
        <div id="q-meta"></div>
        <div id="q-text"></div>
      </div>
      <div id="answers"></div>
      <div id="feedback"></div>
      <button id="next-btn">Next question →</button>
    </div>

    <div id="result-screen" style="display:none">
      <div id="score-ring">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <circle cx="60" cy="60" r="52" fill="none" stroke="#e8e8e8" stroke-width="10"/>
          <circle id="ring-arc" cx="60" cy="60" r="52" fill="none" stroke="#7F77DD"
            stroke-width="10" stroke-linecap="round"
            stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
        </svg>
        <div class="ring-text">
          <span class="ring-num" id="final-score">0</span>
          <span class="ring-denom">of 9</span>
        </div>
      </div>
      <h2 id="result-heading">Quiz complete!</h2>
      <p id="result-sub"></p>
      <div id="result-breakdown">
        <div class="stat-card"><div class="val correct-val" id="stat-correct">0</div><div class="lbl">Correct</div></div>
        <div class="stat-card"><div class="val wrong-val" id="stat-wrong">0</div><div class="lbl">Wrong</div></div>
        <div class="stat-card"><div class="val" id="stat-pct">0%</div><div class="lbl">Accuracy</div></div>
      </div>
      <button id="play-again">Play again</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
